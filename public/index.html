<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiicafe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sign In / Sign Up Screen -->
  <div class="container" id="authScreen">
    <h1>Aiicafe</h1>
    <p class="subtitle">Sign in to order your lunch!</p>

    <div class="login-box">
      <!-- Toggle between Sign In and Sign Up -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="signinTab" onclick="showSignIn()">Sign In</button>
        <button class="auth-tab" id="signupTab" onclick="showSignUp()">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <div id="signinForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signinUser" placeholder="Your username...">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signinPass" placeholder="Your password...">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="doSignIn()">Sign In</button>
      </div>

      <!-- Sign Up Form -->
      <div id="signupForm" style="display:none;">
        <div class="form-group">
          <label>Choose a Username</label>
          <input type="text" id="signupUser" placeholder="Pick a username...">
        </div>
        <div class="form-group">
          <label>Choose a Password</label>
          <input type="password" id="signupPass" placeholder="Pick a password...">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupPass2" placeholder="Type password again...">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="doSignUp()">Sign Up</button>
      </div>

      <p id="authError" class="auth-error" style="display:none;"></p>
      <p id="authSuccess" class="auth-success" style="display:none;"></p>
    </div>
  </div>

  <!-- Main Order Screen (hidden until login) -->
  <div class="container" id="orderScreen" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>Aiicafe</h1>
      <div style="text-align:right;">
        <span style="color:#888; font-size:0.9em;">Hi, <strong id="welcomeName"></strong>!</span>
        <button class="btn btn-sm" style="background:#eee; color:#999; margin-left:8px;" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <p class="subtitle">Pick your lunch today!</p>

    <div id="orderForm">
      <!-- Category tabs -->
      <div class="category-tabs" id="categoryTabs"></div>

      <div id="menuContainer"></div>

      <!-- Selected items bar -->
      <div id="selectionBar" class="selection-bar" style="display:none;">
        <div class="selection-header">
          <span>Your picks: <strong id="pickCount">0</strong> items</span>
          <button class="btn btn-sm btn-danger" onclick="clearAll()">Clear All</button>
        </div>
        <div id="selectedList" class="chip-list"></div>
      </div>

      <button class="btn btn-primary" id="submitBtn" style="width:100%; font-size:1.15em;" disabled>
        Pick your food first!
      </button>
    </div>

  </div>

  <!-- Floating admin button - always visible -->
  <button class="floating-admin-btn" onclick="showAdminPrompt()" title="Admin / Teacher">&#9881;</button>

  <!-- Admin password popup -->
  <div class="overlay" id="adminPrompt">
    <div class="overlay-content">
      <h2>Enter Admin Password</h2>
      <p style="color:#888; margin-bottom:15px;">Only authorized users can access this.</p>
      <input type="password" id="adminPassInput" placeholder="Password..." style="text-align:center; margin-bottom:12px;">
      <p id="adminPassError" style="color:#ff6b6b; display:none; margin-bottom:10px;">Wrong password!</p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-primary" onclick="checkAdminPass()">Unlock</button>
        <button class="btn btn-sm" style="background:#eee; color:#666;" onclick="closeAdminPrompt()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Confirmation overlay -->
  <div class="overlay" id="confirmOverlay">
    <div class="overlay-content">
      <div class="checkmark">&#10004;</div>
      <h2>Order Placed!</h2>
      <p id="confirmMsg"></p>
      <div id="confirmItems"></div>
      <button class="btn btn-primary" onclick="newOrder()" style="margin-top:15px;">Done</button>
    </div>
  </div>

  <script>
    let selectedFoods = new Set();
    let activeCategory = 'all';
    let currentUser = null;

    // --- Auth ---
    function showSignIn() {
      document.getElementById('signinForm').style.display = 'block';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('signinTab').classList.add('active');
      document.getElementById('signupTab').classList.remove('active');
      hideMessages();
    }

    function showSignUp() {
      document.getElementById('signinForm').style.display = 'none';
      document.getElementById('signupForm').style.display = 'block';
      document.getElementById('signupTab').classList.add('active');
      document.getElementById('signinTab').classList.remove('active');
      hideMessages();
    }

    function hideMessages() {
      document.getElementById('authError').style.display = 'none';
      document.getElementById('authSuccess').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('authSuccess').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('authError').style.display = 'none';
    }

    async function doSignUp() {
      const username = document.getElementById('signupUser').value.trim();
      const password = document.getElementById('signupPass').value;
      const password2 = document.getElementById('signupPass2').value;

      if (!username) return showError('Please pick a username!');
      if (!password) return showError('Please pick a password!');
      if (password !== password2) return showError('Passwords don\'t match!');

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        showSuccess('Account created! You can sign in now.');
        setTimeout(() => {
          showSignIn();
          document.getElementById('signinUser').value = username;
        }, 1000);
      } else {
        const data = await res.json();
        showError(data.error || 'Something went wrong');
      }
    }

    async function doSignIn() {
      const username = document.getElementById('signinUser').value.trim();
      const password = document.getElementById('signinPass').value;

      if (!username) return showError('Please type your username!');
      if (!password) return showError('Please type your password!');

      const res = await fetch('/api/student-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        const data = await res.json();
        currentUser = data.username;
        sessionStorage.setItem('aiifood_student', currentUser);
        enterApp();
      } else {
        showError('Wrong username or password!');
      }
    }

    function enterApp() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('orderScreen').style.display = 'block';
      document.getElementById('welcomeName').textContent = currentUser;
      loadMenu();
    }

    function signOut() {
      sessionStorage.removeItem('aiifood_student');
      currentUser = null;
      location.reload();
    }

    function newOrder() {
      document.getElementById('confirmOverlay').classList.remove('show');
      selectedFoods.clear();
      document.querySelectorAll('.food-card.selected').forEach(c => c.classList.remove('selected'));
      updateSelectionBar();
    }

    // Check if already signed in
    function checkLogin() {
      const saved = sessionStorage.getItem('aiifood_student');
      if (saved) {
        currentUser = saved;
        enterApp();
      }
    }

    // Enter key support for sign in/up forms
    document.getElementById('signinPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSignIn();
    });
    document.getElementById('signupPass2').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSignUp();
    });

    // --- Menu ---
    async function loadMenu() {
      const [menuRes, enabledRes] = await Promise.all([
        fetch('/api/menu'),
        fetch('/api/enabled-categories')
      ]);
      const menu = await menuRes.json();
      const enabled = await enabledRes.json();
      const container = document.getElementById('menuContainer');
      const tabsContainer = document.getElementById('categoryTabs');
      container.innerHTML = '';
      tabsContainer.innerHTML = '';

      const categories = Object.keys(menu).filter(cat => enabled.includes(cat) && menu[cat] && menu[cat].length > 0);
      if (categories.length === 0) {
        container.innerHTML = '<div style="color:#999; text-align:center; padding:30px;">No menu set for today. Ask your teacher!</div>';
        return;
      }

      // Build category tabs
      const allTab = document.createElement('button');
      allTab.className = `cat-tab ${activeCategory === 'all' ? 'active' : ''}`;
      allTab.textContent = 'All';
      allTab.onclick = (e) => switchCategory('all', e.target);
      tabsContainer.appendChild(allTab);

      categories.forEach(cat => {
        const tab = document.createElement('button');
        tab.className = `cat-tab ${activeCategory === cat ? 'active' : ''}`;
        tab.textContent = cat;
        tab.onclick = (e) => switchCategory(cat, e.target);
        tabsContainer.appendChild(tab);
      });

      // Build food sections
      categories.forEach(cat => {
        const items = menu[cat];

        const section = document.createElement('div');
        section.className = 'menu-section';
        section.dataset.category = cat;
        if (activeCategory !== 'all' && activeCategory !== cat) {
          section.style.display = 'none';
        }
        section.innerHTML = `<h2 class="category-title">${cat}</h2>`;

        const grid = document.createElement('div');
        grid.className = 'food-grid';

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'food-card';
          if (selectedFoods.has(item.name)) card.classList.add('selected');
          card.dataset.name = item.name;
          card.onclick = () => toggleFood(item.name, card);
          card.innerHTML = `
            <div class="food-emoji">${item.emoji}</div>
            <div class="food-name">${item.name}</div>
          `;
          grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    function switchCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.menu-section').forEach(sec => {
        if (cat === 'all' || sec.dataset.category === cat) {
          sec.style.display = '';
        } else {
          sec.style.display = 'none';
        }
      });
    }

    function toggleFood(name, card) {
      if (selectedFoods.has(name)) {
        selectedFoods.delete(name);
        card.classList.remove('selected');
      } else {
        selectedFoods.add(name);
        card.classList.add('selected');
      }
      updateSelectionBar();
    }

    function updateSelectionBar() {
      const bar = document.getElementById('selectionBar');
      const list = document.getElementById('selectedList');
      const count = document.getElementById('pickCount');
      const btn = document.getElementById('submitBtn');

      if (selectedFoods.size === 0) {
        bar.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Pick your food first!';
        return;
      }

      bar.style.display = 'block';
      count.textContent = selectedFoods.size;
      list.innerHTML = '';
      selectedFoods.forEach(name => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `${name} <span class="remove" onclick="event.stopPropagation(); removePick('${name.replace(/'/g, "\\'")}')">&times;</span>`;
        list.appendChild(chip);
      });

      btn.disabled = false;
      btn.textContent = `Order ${selectedFoods.size} item${selectedFoods.size > 1 ? 's' : ''}`;
    }

    function removePick(name) {
      selectedFoods.delete(name);
      const card = document.querySelector(`.food-card[data-name="${name}"]`);
      if (card) card.classList.remove('selected');
      updateSelectionBar();
    }

    function clearAll() {
      selectedFoods.clear();
      document.querySelectorAll('.food-card.selected').forEach(c => c.classList.remove('selected'));
      updateSelectionBar();
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      if (!currentUser) return alert('Please sign in first!');
      if (selectedFoods.size === 0) return alert('Please pick at least one food!');

      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentName: currentUser, foods: [...selectedFoods] })
      });

      if (res.ok) {
        document.getElementById('confirmMsg').textContent = currentUser;
        document.getElementById('confirmItems').innerHTML =
          [...selectedFoods].map(f => `<span class="chip">${f}</span>`).join(' ');
        document.getElementById('confirmOverlay').classList.add('show');
      }
    });

    // --- Admin prompt ---
    function showAdminPrompt() {
      document.getElementById('adminPrompt').classList.add('show');
      document.getElementById('adminPassInput').value = '';
      document.getElementById('adminPassError').style.display = 'none';
      document.getElementById('adminPassInput').focus();
    }

    function closeAdminPrompt() {
      document.getElementById('adminPrompt').classList.remove('show');
    }

    async function checkAdminPass() {
      const pw = document.getElementById('adminPassInput').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        sessionStorage.setItem('aiifood_auth', 'true');
        window.location.href = '/admin.html';
      } else {
        document.getElementById('adminPassError').style.display = 'block';
      }
    }

    document.getElementById('adminPassInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAdminPass();
    });

    checkLogin();
  </script>
</body>
</html>
